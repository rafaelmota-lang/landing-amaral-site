server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain text/css text/xml application/xml application/xml+rss
    application/javascript application/json application/manifest+json
    image/svg+xml font/woff2;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: ; style-src 'self' 'unsafe-inline' https: ; img-src 'self' data: blob: https: ; font-src 'self' data: https: ; connect-src 'self' https: wss: ; frame-src https: ; base-uri 'self'; form-action 'self' https://app.leadster.com.br; object-src 'none'; upgrade-insecure-requests" always;

  location ~* ^/(assets|fonts)/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location = /favicon.png { access_log off; log_not_found off; expires 7d; }
  location = /robots.txt { access_log off; log_not_found off; }
  location = /sitemap.xml { access_log off; log_not_found off; }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~ /\.(?!well-known) { deny all; }
}
